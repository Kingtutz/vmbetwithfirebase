<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Betting - Login</title>
    <link rel="stylesheet" href="Css/shared.css" />
    <link rel="stylesheet" href="Css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <!-- Login Form -->
      <div id="loginForm">
        <h1>Login</h1>
        <p class="subtitle">Sign in to your account</p>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input
            id="loginEmail"
            type="email"
            placeholder="your@email.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input
            id="loginPassword"
            type="password"
            placeholder="Your password"
            required
          />
        </div>
        <div class="form-group">
          <label for="loginNickname">Nickname (optional update)</label>
          <input id="loginNickname" type="text" placeholder="Your nickname" />
        </div>
        <div class="error" id="loginError"></div>
        <button id="loginBtn" type="button">Sign In</button>
        <button class="toggle-btn toggle-to-signup" type="button">
          Don't have an account? Sign up
        </button>
      </div>

      <!-- Signup Form -->
      <div id="signupForm">
        <h1>Create Account</h1>
        <p class="subtitle">Join the world cup betting</p>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input
            id="signupEmail"
            type="email"
            placeholder="your@email.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="signupNickname">Nickname</label>
          <input
            id="signupNickname"
            type="text"
            placeholder="Pick a nickname"
            required
          />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input
            id="signupPassword"
            type="password"
            placeholder="Min. 6 characters"
            required
          />
        </div>
        <div class="form-group">
          <label for="signupPasswordConfirm">Confirm Password</label>
          <input
            id="signupPasswordConfirm"
            type="password"
            placeholder="Confirm password"
            required
          />
        </div>
        <div class="error" id="signupError"></div>
        <button id="signupBtn" type="button">Create Account</button>
        <button class="toggle-btn toggle-to-login" type="button">
          Already have an account? Sign in
        </button>
      </div>
    </div>

    <script type="module" src="Js/login.js"></script>
  </body>
</html>
