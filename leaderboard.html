<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="leaderboard.title">Top List - Prediction Scores</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="Css/shared.css" />
    <link rel="stylesheet" href="Css/account-modal.css" />
    <link rel="stylesheet" href="Css/leaderboard.css" />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div>
          <h1 data-i18n="leaderboard.headerTitle">Top List</h1>
          <p data-i18n="leaderboard.headerText">
            Each correct answer gives 1 point.
          </p>
        </div>
        <div class="user-info">
          <span id="userEmail" data-i18n="common.loading">Loading...</span>
          <button id="logoutBtn" data-i18n="common.logout">Logout</button>
        </div>
      </div>

      <nav class="nav-buttons">
        <a href="index.html" class="nav-btn" data-i18n="common.info">Info</a>
        <a href="groups.html" class="nav-btn" data-i18n="common.groups"
          >Groups</a
        >
        <a href="bets.html" class="nav-btn" data-i18n="common.matches"
          >Matches</a
        >
        <a href="winner.html" class="nav-btn" data-i18n="common.winnerBet"
          >Winner Bet</a
        >
        <a href="admin.html" class="nav-btn" data-i18n="common.admin">Admin</a>
        <button class="nav-btn active" disabled data-i18n="common.topList">
          Top List
        </button>
      </nav>

      <section id="notice" class="notice" style="display: none"></section>

      <section class="leaderboard-card">
        <h2 class="leaderboard-title" data-i18n="leaderboard.ranking">
          Ranking
        </h2>
        <div id="payoutBreakdown" class="payout-breakdown">
          <span class="payout-chip" data-i18n="leaderboard.firstPrizeDefault"
            >1st: 0 kr</span
          >
          <span class="payout-chip" data-i18n="leaderboard.secondPrizeDefault"
            >2nd: 0 kr</span
          >
          <span class="payout-chip" data-i18n="leaderboard.thirdPrizeDefault"
            >3rd: 0 kr</span
          >
        </div>
        <div id="leaderboard"></div>
      </section>
    </main>

    <div id="accountSettingsModal" class="account-modal" style="display: none">
      <div class="account-modal-content">
        <button class="account-modal-close" type="button" aria-label="Close">
          ×
        </button>
        <h2 data-i18n="account.settings">Account Settings</h2>
        <form id="accountForm" class="account-form">
          <div class="form-group">
            <label for="accountNickname" data-i18n="common.nickname"
              >Nickname</label
            >
            <input type="text" id="accountNickname" class="form-input" />
          </div>
          <div class="form-group">
            <label for="accountEmail" data-i18n="common.email">Email</label>
            <input type="email" id="accountEmail" class="form-input" />
          </div>
          <div class="form-group">
            <label for="accountPassword" data-i18n="common.password"
              >New Password</label
            >
            <input
              type="password"
              id="accountPassword"
              class="form-input"
              placeholder="Leave blank to keep current"
            />
          </div>
          <div
            id="accountMessage"
            class="account-message"
            style="display: none"
          ></div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" data-i18n="common.save">
              Save
            </button>
            <button
              type="button"
              class="btn-secondary account-modal-close"
              data-i18n="common.cancel"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
    <div
      id="accountModalBackdrop"
      class="account-modal-backdrop"
      style="display: none"
    ></div>

    <script type="module" src="Js/leaderboard.js"></script>
  </body>
</html>
