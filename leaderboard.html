<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="leaderboard.title">Top List - Prediction Scores</title>
    <link rel="stylesheet" href="Css/shared.css" />
    <link rel="stylesheet" href="Css/leaderboard.css" />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div>
          <h1 data-i18n="leaderboard.headerTitle">Top List</h1>
          <p data-i18n="leaderboard.headerText">
            Each correct answer gives 1 point.
          </p>
        </div>
        <div class="user-info">
          <span id="userEmail" data-i18n="common.loading">Loading...</span>
          <button id="logoutBtn" data-i18n="common.logout">Logout</button>
        </div>
      </div>

      <nav class="nav-buttons">
        <a href="index.html" class="nav-btn" data-i18n="common.info">Info</a>
        <a href="groups.html" class="nav-btn" data-i18n="common.groups"
          >Groups</a
        >
        <a href="bets.html" class="nav-btn" data-i18n="common.matches"
          >Matches</a
        >
        <a href="admin.html" class="nav-btn" data-i18n="common.admin">Admin</a>
        <button class="nav-btn active" disabled data-i18n="common.topList">
          Top List
        </button>
      </nav>

      <section id="notice" class="notice" style="display: none"></section>

      <section class="leaderboard-card">
        <h2 class="leaderboard-title" data-i18n="leaderboard.ranking">
          Ranking
        </h2>
        <div id="payoutBreakdown" class="payout-breakdown">
          <span class="payout-chip">1st: 0 kr</span>
          <span class="payout-chip">2nd: 0 kr</span>
          <span class="payout-chip">3rd: 0 kr</span>
        </div>
        <div id="leaderboard"></div>
      </section>
    </main>

    <script type="module" src="Js/leaderboard.js"></script>
  </body>
</html>
