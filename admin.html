<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="admin.title">Admin - Set Match Winners</title>
    <link rel="stylesheet" href="Css/shared.css" />
    <link rel="stylesheet" href="Css/admin.css" />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div>
          <h1 data-i18n="admin.headerTitle">Admin Panel</h1>
          <p data-i18n="admin.headerText">
            Designate the winner for each match.
          </p>
        </div>
        <div class="user-info">
          <span id="userEmail" data-i18n="common.loading">Loading...</span>
          <button id="logoutBtn" data-i18n="common.logout">Logout</button>
        </div>
      </div>

      <section class="api-sync-card">
        <h2 class="api-sync-title" data-i18n="admin.apiSyncTitle">
          API-FOOTBALL Live Sync
        </h2>
        <p class="api-sync-subtitle" data-i18n="admin.apiSyncSubtitle">
          Add your API key and sync finished World Cup matches automatically.
        </p>
        <div class="api-sync-row">
          <input
            id="apiFootballKey"
            type="password"
            placeholder="API-FOOTBALL key"
            data-i18n-placeholder="admin.apiKeyPlaceholder"
            autocomplete="off"
          />
          <button
            id="saveApiKeyBtn"
            class="api-btn"
            type="button"
            data-i18n="admin.saveKey"
          >
            Save key
          </button>
          <button
            id="syncLiveBtn"
            class="api-btn"
            type="button"
            data-i18n="admin.syncLive"
          >
            Sync live scores
          </button>
        </div>
        <p id="apiSyncStatus" class="api-sync-status"></p>
      </section>

      <nav class="nav-buttons">
        <a href="groups.html" class="nav-btn" data-i18n="common.groups"
          >Groups</a
        >
        <a href="bets.html" class="nav-btn" data-i18n="common.matches"
          >Matches</a
        >
        <button class="nav-btn active" disabled data-i18n="common.admin">
          Admin
        </button>
        <a href="leaderboard.html" class="nav-btn" data-i18n="common.topList"
          >Top List</a
        >
      </nav>

      <section
        id="adminNotice"
        class="admin-notice"
        style="display: none"
      ></section>

      <section id="matches" class="matches-grid"></section>

      <section class="users-section">
        <h2 class="users-heading">
          <span data-i18n="admin.registeredUsers">Registered Users</span>
          <span id="usersBetSummary" class="users-bet-summary"
            >Total bet: 0 kr</span
          >
        </h2>
        <div id="usersNotice" class="admin-notice" style="display: none"></div>
        <div id="usersList"></div>
      </section>
    </main>

    <script type="module" src="Js/admin.js"></script>
  </body>
</html>
