<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title data-i18n="bets.title">World Cup Matches - Make Predictions</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <link rel="stylesheet" href="Css/shared.css" />
    <link rel="stylesheet" href="Css/account-modal.css" />
    <link rel="stylesheet" href="Css/bets.css" />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div>
          <h1 data-i18n="bets.headerTitle">World Cup Matches</h1>
          <p data-i18n="bets.headerText">
            Make your predictions for every match.
          </p>
        </div>
        <div class="user-info">
          <span id="userEmail" data-i18n="common.loading">Loading...</span>
          <button id="logoutBtn" data-i18n="common.logout">Logout</button>
        </div>
      </div>

      <div class="toolbar">
        <button
          id="compactToggle"
          type="button"
          class="compact-toggle"
          data-i18n="bets.compactOn"
        >
          Compact Mode: On
        </button>
      </div>

      <nav class="nav-buttons">
        <a href="index.html" class="nav-btn" data-i18n="common.info">Info</a>
        <a href="groups.html" class="nav-btn" data-i18n="common.groups"
          >Groups</a
        >
        <button class="nav-btn active" disabled data-i18n="common.matches">
          Matches
        </button>
        <a href="winner.html" class="nav-btn" data-i18n="common.winnerBet"
          >Winner Bet</a
        >
        <a href="admin.html" class="nav-btn" data-i18n="common.admin">Admin</a>
        <a href="leaderboard.html" class="nav-btn" data-i18n="common.topList"
          >Top List</a
        >
      </nav>

      <section id="matches" class="matches-grid"></section>

      <section id="betsPanel" class="bets-panel">
        <h2 class="panel-title" data-i18n="bets.myPredictions">
          My Predictions
        </h2>
        <p data-i18n="bets.predictionsAppearHere">
          Your predictions will appear here.
        </p>
      </section>
    </main>

    <div id="accountSettingsModal" class="account-modal" style="display: none">
      <div class="account-modal-content">
        <button class="account-modal-close" type="button" aria-label="Close">
          ×
        </button>
        <h2 data-i18n="account.settings">Account Settings</h2>
        <form id="accountForm" class="account-form">
          <div class="form-group">
            <label for="accountNickname" data-i18n="common.nickname"
              >Nickname</label
            >
            <input type="text" id="accountNickname" class="form-input" />
          </div>
          <div class="form-group">
            <label for="accountEmail" data-i18n="common.email">Email</label>
            <input type="email" id="accountEmail" class="form-input" />
          </div>
          <div class="form-group">
            <label for="accountPassword" data-i18n="common.password"
              >New Password</label
            >
            <input
              type="password"
              id="accountPassword"
              class="form-input"
              placeholder="Leave blank to keep current"
            />
          </div>
          <div
            id="accountMessage"
            class="account-message"
            style="display: none"
          ></div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" data-i18n="common.save">
              Save
            </button>
            <button
              type="button"
              class="btn-secondary account-modal-close"
              data-i18n="common.cancel"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
    <div
      id="accountModalBackdrop"
      class="account-modal-backdrop"
      style="display: none"
    ></div>

    <script type="module" src="Js/bets.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
