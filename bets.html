<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Matches - Make Predictions</title>
    <link rel="stylesheet" href="Css/shared.css" />
    <link rel="stylesheet" href="Css/bets.css" />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div>
          <h1>World Cup Matches</h1>
          <p>Make your predictions for every match.</p>
        </div>
        <div class="user-info">
          <span id="userEmail">Loading...</span>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="toolbar">
        <input id="roundFilter" type="search" placeholder="Search round..." />
      </div>

      <nav class="nav-buttons">
        <a href="index.html" class="nav-btn">Groups</a>
        <button class="nav-btn active" disabled>Matches</button>
        <a href="admin.html" class="nav-btn">Admin</a>
        <a href="leaderboard.html" class="nav-btn">Top List</a>
      </nav>

      <section id="matches" class="matches-grid"></section>

      <section id="betsPanel" class="bets-panel">
        <h2 class="panel-title">My Predictions</h2>
        <p>Your predictions will appear here.</p>
      </section>
    </main>

    <script type="module" src="Js/bets.js"></script>
  </body>
</html>
